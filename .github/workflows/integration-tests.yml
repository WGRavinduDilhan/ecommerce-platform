name: Integration Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC
  workflow_dispatch:

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    
    services:
      product-db:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: productdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      order-db:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: orderdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5433:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Compose
        run: |
          docker --version
          docker compose version

      - name: Start services with Docker Compose
        run: |
          docker compose up -d
        env:
          DATABASE_URL: postgresql://user:password@localhost:5432/productdb
          ORDER_DATABASE_URL: postgresql://user:password@localhost:5433/orderdb

      - name: Wait for services to be ready
        run: |
          timeout 60 bash -c 'until curl -f http://localhost:8000/health; do sleep 1; done'
          timeout 60 bash -c 'until curl -f http://localhost:3000/health || true; do sleep 1; done'
          sleep 5

      - name: Run Product Service tests
        run: |
          cd services/product-service
          python -m pip install -r requirements.txt
          pytest -v --tb=short

      - name: Test Product API endpoints
        run: |
          curl -X GET http://localhost:8000/health
          curl -X GET http://localhost:8000/products

      - name: Test Order API endpoints
        run: |
          curl -X GET http://localhost:3000/health || true

      - name: Run frontend build
        run: |
          cd services/frontend
          npm install
          npm run build

      - name: Check frontend assets
        run: |
          test -d services/frontend/dist && echo "✓ Frontend build successful" || exit 1

      - name: Collect Docker logs on failure
        if: failure()
        run: |
          docker compose logs > docker-compose.log
          ls -la services/*/

      - name: Upload Docker logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-compose-logs
          path: docker-compose.log
          retention-days: 7

      - name: Stop services
        if: always()
        run: docker compose down -v
