name: Product Service Build & Deploy

on:
  push:
    branches: [main, develop]
    paths:
      - 'services/product-service/**'
      - '.github/workflows/product-service.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'services/product-service/**'
  workflow_dispatch:

permissions:
  contents: read

env:
  SERVICE_NAME: product-service
  PYTHON_VERSION: '3.11'
  REGISTRY: us-central1-docker.pkg.dev
  IMAGE_NAME: ${{ secrets.GCP_PROJECT_ID }}/ecommerce-images/product-service

jobs:
  test:
    runs-on: ubuntu-latest
    name: Test Product Service
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ secrets.CI_REPO_PAT || github.token }}
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: 'services/product-service/requirements.txt'

      - name: Install dependencies
        run: |
          cd services/product-service
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with pylint
        run: |
          cd services/product-service
          pip install pylint
          pylint app/*.py --disable=all --enable=E,F || echo "Linting completed with warnings"

      - name: Format check with black
        run: |
          cd services/product-service
          pip install black
          black --check app/ || echo "Format check completed"

      - name: Type check with mypy
        run: |
          cd services/product-service
          pip install mypy
          mypy app/ --ignore-missing-imports || echo "Type check completed"

      - name: Run pytest
        run: |
          cd services/product-service
          pytest app/ -v --tb=short --junit-xml=test-results.xml || echo "Some tests failed"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: product-service-test-results
          path: services/product-service/test-results.xml
          retention-days: 30

  build:
    needs: test
    runs-on: ubuntu-latest
    name: Build Docker Image
    permissions:
      packages: write
      contents: read
      id-token: write
    
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
    
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ secrets.CI_REPO_PAT || github.token }}
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Authenticate to GCP
        id: auth
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        if: github.event_name != 'pull_request'
        with:
          token_format: 'access_token'
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Log in to Google Artifact Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        if: github.event_name != 'pull_request'
        with:
          registry: ${{ env.REGISTRY }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: ./services/product-service
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  scan:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    name: Scan Image for Vulnerabilities
    permissions:
      security-events: write
      contents: read
      id-token: write
    
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ secrets.CI_REPO_PAT || github.token }}
          fetch-depth: 1

      - name: Authenticate to GCP
        id: auth
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          token_format: 'access_token'
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Log in to Google Artifact Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@cf5c088a69634cd13ccddc735d7926162c31f9a6 # master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
        continue-on-error: true

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy-product-service'
        continue-on-error: true

  deploy-staging:
    needs: [test, build]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    runs-on: ubuntu-latest
    name: Deploy to Staging
    environment:
      name: staging
    
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ secrets.CI_REPO_PAT || github.token }}
          fetch-depth: 1

      - name: Authenticate to GCP
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@e30db14379863a8c79331b04a9969f4c1e225e0b # v1

      - name: Install GKE auth plugin
        run: gcloud components install gke-gcloud-auth-plugin --quiet

      - name: Get GKE credentials
        env:
          USE_GKE_GCLOUD_AUTH_PLUGIN: "True"
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          gcloud container clusters get-credentials ecommerce-cluster \
            --zone us-central1 \
            --project "$GCP_PROJECT_ID"

      - name: Ensure namespace exists
        run: |
          kubectl create namespace ecommerce-staging --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy manifests
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          sed -i "s|PROJECT_ID|$GCP_PROJECT_ID|g; s|:v1.0.0|:${{ github.sha }}|g" k8s/product-service/deployment.yaml
          kubectl apply -f k8s/product-service/deployment.yaml -n ecommerce-staging

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/product-service \
            -n ecommerce-staging \
            --timeout=5m

      - name: Health check
        run: |
          kubectl get pods -n ecommerce-staging -l app=product-service

  deploy-production:
    needs: [test, build, scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    name: Deploy to Production
    environment:
      name: production
    
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ secrets.CI_REPO_PAT || github.token }}
          fetch-depth: 1

      - name: Authenticate to GCP
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@e30db14379863a8c79331b04a9969f4c1e225e0b # v1

      - name: Install GKE auth plugin
        run: gcloud components install gke-gcloud-auth-plugin --quiet

      - name: Get GKE credentials
        env:
          USE_GKE_GCLOUD_AUTH_PLUGIN: "True"
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          gcloud container clusters get-credentials ecommerce-cluster \
            --zone us-central1 \
            --project "$GCP_PROJECT_ID"

      - name: Ensure namespace exists
        run: |
          kubectl create namespace ecommerce --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy manifests
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          sed -i "s|PROJECT_ID|$GCP_PROJECT_ID|g; s|:v1.0.0|:${{ github.sha }}|g" k8s/product-service/deployment.yaml
          kubectl apply -f k8s/product-service/deployment.yaml -n ecommerce

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/product-service \
            -n ecommerce \
            --timeout=10m

      - name: Verify deployment
        run: |
          kubectl rollout history deployment/product-service -n ecommerce

      - name: Notify Slack
        if: success()
        uses: 8398a7/action-slack@77eaa4f1c608a7d68b38af4e3f739dcd8cba273e # v3
        with:
          status: success
          text: 'Product Service deployed to production'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true
