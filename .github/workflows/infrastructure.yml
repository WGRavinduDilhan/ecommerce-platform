name: Infrastructure as Code

on:
  workflow_dispatch:  # manual trigger only
  push:
    branches: [main]
    paths:
      - 'infra/**'    # only triggers when Terraform files change

env:
  TF_VERSION: 1.7.5
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  terraform-plan:
    runs-on: ubuntu-latest
    env:
      WIF_PROVIDER: ${{ secrets.WIF_PROVIDER }}
      WIF_SERVICE_ACCOUNT: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Check Google Cloud credentials
        id: creds
        run: |
          if [ -n "${WIF_PROVIDER}" ] && [ -n "${WIF_SERVICE_ACCOUNT}" ] && [ -n "${GCP_PROJECT_ID}" ]; then
            echo "has_creds=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_creds=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Authenticate to Google Cloud
        if: steps.creds.outputs.has_creds == 'true'
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        if: steps.creds.outputs.has_creds == 'true'
        uses: google-github-actions/setup-gcloud@e30db14379863a8c79331b04a9969f4c1e225e0b # v1
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Initialize Terraform
        run: |
          cd infra
          if [ "${{ steps.creds.outputs.has_creds }}" = "true" ]; then
            terraform init
          else
            terraform init -backend=false
          fi

      - name: Format check
        run: |
          cd infra
          terraform fmt -check

      - name: Validate Terraform
        run: |
          cd infra
          terraform validate

      - name: Run tflint
        uses: terraform-linters/setup-tflint@90f302c255ef959cbfb4bd10581afecdb7ece3e6 # v4
        with:
          tflint_version: v0.50.0

      - name: Lint Terraform
        run: |
          cd infra
          tflint --init
          tflint

      - name: Plan Terraform
        id: plan
        if: steps.creds.outputs.has_creds == 'true'
        run: |
          set -o pipefail
          cd infra
          terraform plan \
            -var="project_id=${{ secrets.GCP_PROJECT_ID }}" \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -out=tfplan 2>&1 | tee plan.log
          terraform show -json tfplan > plan.json

      - name: Comment PR with plan
        if: github.event_name == 'pull_request' && steps.creds.outputs.has_creds == 'true'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const comment = `Terraform plan completed successfully for this PR.

            The detailed plan output is available in the \\`terraform-plan\\` artifact from this workflow run.`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment,
            });

      # CRITICAL: only upload when plan actually ran and produced tfplan
      - name: Upload plan
        if: steps.creds.outputs.has_creds == 'true' && steps.plan.outcome == 'success'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: terraform-plan
          path: |
            infra/tfplan
            infra/plan.json
            infra/plan.log
          retention-days: 1

  terraform-apply:
    needs: terraform-plan
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    environment:
      name: production
    env:
      WIF_PROVIDER: ${{ secrets.WIF_PROVIDER }}
      WIF_SERVICE_ACCOUNT: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
    
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Check Google Cloud credentials
        id: creds
        run: |
          if [ -n "${WIF_PROVIDER}" ] && [ -n "${WIF_SERVICE_ACCOUNT}" ] && [ -n "${GCP_PROJECT_ID}" ]; then
            echo "has_creds=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_creds=false" >> "$GITHUB_OUTPUT"
            echo "Missing WIF_PROVIDER, WIF_SERVICE_ACCOUNT or GCP_PROJECT_ID repository secrets. terraform-apply requires Google Cloud credentials." >&2
            exit 1
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Authenticate to Google Cloud
        if: steps.creds.outputs.has_creds == 'true'
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        if: steps.creds.outputs.has_creds == 'true'
        uses: google-github-actions/setup-gcloud@e30db14379863a8c79331b04a9969f4c1e225e0b # v1
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Initialize Terraform
        if: steps.creds.outputs.has_creds == 'true'
        run: |
          cd infra
          terraform init

      # Downloads the tfplan produced and uploaded by terraform-plan job
      - name: Download plan
        if: steps.creds.outputs.has_creds == 'true'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: terraform-plan
          path: infra/

      - name: Apply Terraform
        if: steps.creds.outputs.has_creds == 'true'
        run: |
          cd infra
          terraform apply -auto-approve tfplan

      - name: Get outputs
        if: steps.creds.outputs.has_creds == 'true'
        id: outputs
        run: |
          cd infra
          echo "cluster_name=$(terraform output -raw gke_cluster_name)" >> $GITHUB_OUTPUT
          echo "region=$(terraform output -raw region)" >> $GITHUB_OUTPUT

      - name: Update deployment status
        run: |
          echo "## Infrastructure Deployment" >> $GITHUB_STEP_SUMMARY
          echo "Status: ✅ Applied" >> $GITHUB_STEP_SUMMARY
          echo "Cluster: ${{ steps.outputs.outputs.cluster_name }}" >> $GITHUB_STEP_SUMMARY
          echo "Region: ${{ steps.outputs.outputs.region }}" >> $GITHUB_STEP_SUMMARY

      - name: Notify Slack
        if: always()
        uses: 8398a7/action-slack@77eaa4f1c608a7d68b38af4e3f739dcd8cba273e # v3
        with:
          status: ${{ job.status }}
          text: 'Infrastructure deployment - Cluster: ${{ steps.outputs.outputs.cluster_name }}'
          slack_webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true

  cost-estimation:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    env:
      WIF_PROVIDER: ${{ secrets.WIF_PROVIDER }}
      WIF_SERVICE_ACCOUNT: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Check Google Cloud credentials
        id: creds
        run: |
          if [ -n "${WIF_PROVIDER}" ] && [ -n "${WIF_SERVICE_ACCOUNT}" ] && [ -n "${GCP_PROJECT_ID}" ]; then
            echo "has_creds=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_creds=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Authenticate to Google Cloud
        if: steps.creds.outputs.has_creds == 'true'
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        if: steps.creds.outputs.has_creds == 'true'
        uses: google-github-actions/setup-gcloud@e30db14379863a8c79331b04a9969f4c1e225e0b # v1
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Initialize Terraform
        run: |
          cd infra
          terraform init -reconfigure -backend=false -input=false

      - name: Validate Terraform for cost estimation
        run: |
          cd infra
          terraform validate
          echo "Cost estimation requires Infracost integration"
