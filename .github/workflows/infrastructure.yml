name: Infrastructure as Code

on:
  push:
    branches: [main, develop]
    paths:
      - 'infra/**'
      - '.github/workflows/infrastructure.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'infra/**'
  workflow_dispatch:

env:
  TF_VERSION: 1.7.5
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}

jobs:
  terraform-plan:
    runs-on: ubuntu-latest
    env:
      GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Check Google Cloud credentials
        id: creds
        run: |
          if [ -n "${GCP_SA_KEY}" ] && [ -n "${GCP_PROJECT_ID}" ]; then
            echo "has_creds=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_creds=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Authenticate to Google Cloud
        if: steps.creds.outputs.has_creds == 'true'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ env.GCP_SA_KEY }}
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Set up Cloud SDK
        if: steps.creds.outputs.has_creds == 'true'
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Initialize Terraform
        run: |
          cd infra
          if [ "${{ steps.creds.outputs.has_creds }}" = "true" ]; then
            terraform init
          else
            terraform init -backend=false
          fi

      - name: Format check
        run: |
          cd infra
          terraform fmt -check

      - name: Validate Terraform
        run: |
          cd infra
          terraform validate

      - name: Run tflint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.50.0

      - name: Lint Terraform
        run: |
          cd infra
          tflint --init
          tflint

      - name: Plan Terraform
        id: plan
        if: steps.creds.outputs.has_creds == 'true'
        run: |
          cd infra
          terraform plan -out=tfplan -json > plan.json
        continue-on-error: true

      - name: Comment PR with plan
        if: github.event_name == 'pull_request'
        uses: terraform-linters/tflint-load-config-action@v0
        with:
          directory: infra

      - name: Upload plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: infra/tfplan
          retention-days: 5

  terraform-apply:
    needs: terraform-plan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: production
    env:
      GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ env.GCP_SA_KEY }}
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Initialize Terraform
        run: |
          cd infra
          terraform init

      - name: Download plan
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan
          path: infra/

      - name: Apply Terraform
        run: |
          cd infra
          terraform apply -auto-approve tfplan

      - name: Get outputs
        id: outputs
        run: |
          cd infra
          echo "cluster_name=$(terraform output -raw gke_cluster_name)" >> $GITHUB_OUTPUT
          echo "region=$(terraform output -raw region)" >> $GITHUB_OUTPUT

      - name: Update deployment status
        run: |
          echo "## Infrastructure Deployment" >> $GITHUB_STEP_SUMMARY
          echo "Status: ✅ Applied" >> $GITHUB_STEP_SUMMARY
          echo "Cluster: ${{ steps.outputs.outputs.cluster_name }}" >> $GITHUB_STEP_SUMMARY
          echo "Region: ${{ steps.outputs.outputs.region }}" >> $GITHUB_STEP_SUMMARY

      - name: Notify Slack
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: 'Infrastructure deployment - Cluster: ${{ steps.outputs.outputs.cluster_name }}'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true

  cost-estimation:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    env:
      GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Check Google Cloud credentials
        id: creds
        run: |
          if [ -n "${GCP_SA_KEY}" ] && [ -n "${GCP_PROJECT_ID}" ]; then
            echo "has_creds=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_creds=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Authenticate to Google Cloud
        if: steps.creds.outputs.has_creds == 'true'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ env.GCP_SA_KEY }}
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Set up Cloud SDK
        if: steps.creds.outputs.has_creds == 'true'
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Initialize Terraform
        run: |
          cd infra
          if [ "${{ steps.creds.outputs.has_creds }}" = "true" ]; then
            terraform init
          else
            terraform init -backend=false
          fi

      - name: Generate cost estimate
        run: |
          cd infra
          terraform plan -out=tfplan
          echo "Cost estimation requires Infracost integration"
